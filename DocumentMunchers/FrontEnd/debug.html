    <title>JSON POST to Localhost</title>
    <style>
        body {
            font-family: Arial, sans-serif;

            margin-bottom: 20px;

            width: 100%;

        textarea {
            height: 200px;

        button {
            background-color: #007bff;

        }

            background-color: #0056b3;

            background-color: #6c757d;
            cursor: not-allowed;
        }
        .response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            background-color: #f8f9fa;

            display: none;

            background-color: #d4edda;

        }
        .error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }

            display: flex;

        }
        .url-input input {
            flex: 1;
        }
        .url-input button {
            width: auto;
            padding: 10px 15px;
            background-color: #6c757d;
        }
        .url-input button:hover {
            background-color: #545b62;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Send JSON POST to Localhost</h1>
        
        <div class="form-group">
            <label for="url">Target URL:</label>
            <div class="url-input">
                <input type="text" id="url" value="http://localhost:5000/api/data" placeholder="Enter your localhost endpoint URL">
                <button type="button" id="testBtn">Test Default</button>
            </div>
        </div>

        <div class="form-group">
            <label for="jsonData">JSON Data:</label>
            <textarea id="jsonData" placeholder='Enter your JSON data here...'>{
    "name": "John Doe",
    "email": "john@example.com",
    "age": 30,
    "active": true,
    "hobbies": ["reading", "gaming", "coding"]
}</textarea>
        </div>

        <button id="sendBtn">Send POST Request</button>

        <div id="response" class="response"></div>
    </div>

    <script>
        document.getElementById('sendBtn').addEventListener('click', sendJson);
        document.getElementById('testBtn').addEventListener('click', setDefaultUrl);

        function setDefaultUrl() {
            document.getElementById('url').value = 'http://localhost:5000/api/data';
        }

        async function sendJson() {
            const url = document.getElementById('url').value;
            const jsonData = document.getElementById('jsonData').value;
            const responseDiv = document.getElementById('response');
            const sendBtn = document.getElementById('sendBtn');

            // Validate JSON
            let parsedData;
            try {
                parsedData = JSON.parse(jsonData);
            } catch (e) {
                showResponse('Error: Invalid JSON format\n' + e.message, 'error');
                return;
            }

            // Validate URL
            if (!url) {
                showResponse('Error: Please enter a target URL', 'error');
                return;
            }

            // Disable button and show loading
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(parsedData)
                });

                const responseData = await response.text();
                
                let statusText = `Status: ${response.status} ${response.statusText}\n\n`;
                
                // Try to parse response as JSON, if not, show as text
                try {
                    const parsedResponse = JSON.parse(responseData);
                    statusText += JSON.stringify(parsedResponse, null, 2);
                } catch {
                    statusText += responseData;
                }

                showResponse(statusText, response.ok ? 'success' : 'error');
                
            } catch (error) {
                showResponse('Error: ' + error.message + '\n\nMake sure your server is running and CORS is configured properly.', 'error');
            } finally {
                // Re-enable button
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send POST Request';
            }
        }

        function showResponse(message, type) {
            const responseDiv = document.getElementById('response');
            responseDiv.textContent = message;
            responseDiv.className = 'response ' + type;
            responseDiv.style.display = 'block';
            
            // Auto-scroll to response
            responseDiv.scrollIntoView({ behavior: 'smooth' });
        }

        // Syntax highlighting for JSON textarea (basic)
        document.getElementById('jsonData').addEventListener('input', function() {
            try {
                JSON.parse(this.value);
                this.style.borderColor = '#28a745';
            } catch (e) {
                this.style.borderColor = '#dc3545';
            }
        });
    </script>
</body>
